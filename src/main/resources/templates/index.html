<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крестики-нолики</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap"
          rel="stylesheet">
    <style>
        body {
            font-family: 'Google Sans', sans-serif;
        }
    </style>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: "hsl(222.2 47.4% 11.2%)",
                            foreground: "hsl(210 40% 98%)",
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100 flex items-center justify-center p-4">
<div id="app" class="w-full max-w-md">

    <!-- ✅ Форма авторизации (показываем если НЕ авторизован) -->
    <div v-if="!isAuthenticated" class="bg-white rounded-xl shadow-lg p-8 space-y-6">
        <h1 class="text-3xl font-bold text-slate-900 text-center">
            {{ isLoginMode ? 'Вход' : 'Регистрация' }}
        </h1>

        <!-- Переключатель режима -->
        <div class="flex gap-2 p-1 bg-slate-100 rounded-lg">
            <button @click="isLoginMode = true" :class="isLoginMode ? 'bg-white shadow' : 'text-slate-600'"
                    class="flex-1 py-2 px-4 rounded-md font-medium transition-all">
                Вход
            </button>
            <button @click="isLoginMode = false" :class="!isLoginMode ? 'bg-white shadow' : 'text-slate-600'"
                    class="flex-1 py-2 px-4 rounded-md font-medium transition-all">
                Регистрация
            </button>
        </div>

        <!-- Форма -->
        <form @submit.prevent="isLoginMode ? login() : register()" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Логин</label>
                <input v-model="username" type="text" required
                       class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-400">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Пароль</label>
                <input v-model="password" type="password" required
                       class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-400">
            </div>

            <div v-if="error" class="p-3 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm">
                {{ error }}
            </div>

            <div v-if="successMessage"
                 class="p-3 bg-green-50 border border-green-200 rounded-lg text-green-600 text-sm">
                {{ successMessage }}
            </div>

            <button type="submit" :disabled="loading"
                    class="w-full px-6 py-3 bg-primary text-primary-foreground rounded-lg font-semibold shadow-lg hover:shadow-xl transition-all hover:scale-105 active:scale-95 disabled:opacity-50">
                {{ loading ? 'Загрузка...' : (isLoginMode ? 'Войти' : 'Зарегистрироваться') }}
            </button>
        </form>
    </div>

    <!-- ✅ Профиль пользователя (показываем если авторизован) -->
    <div v-else class="bg-white rounded-xl shadow-lg p-8 space-y-6">
        <h1 class="text-3xl font-bold text-slate-900 text-center">Профиль</h1>

        <!-- Информация о пользователе -->
        <div class="space-y-4">
            <div class="p-4 bg-slate-50 rounded-lg">
                <div class="text-sm text-slate-600 mb-1">Логин</div>
                <div class="text-lg font-semibold text-slate-900">{{ currentUser.username }}</div>
            </div>

            <div class="p-4 bg-slate-50 rounded-lg">
                <div class="text-sm text-slate-600 mb-1">Роль</div>
                <div class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium" :class="{
                         'bg-red-100 text-red-800': currentUser.role === 'ROLE_ADMIN',
                         'bg-blue-100 text-blue-800': currentUser.role === 'ROLE_USER',
                         'bg-purple-100 text-purple-800': currentUser.role === 'ROLE_ENGINEER'
                     }">
                    {{ roleDisplay }}
                </div>
            </div>
        </div>

        <!-- Кнопки -->
        <div class="space-y-3">
            <button @click="goToApp"
                    class="w-full px-6 py-3 bg-primary text-primary-foreground rounded-lg font-semibold shadow hover:shadow-lg transition-all hover:scale-105 active:scale-95">
                Перейти к приложению
            </button>

            <button @click="logout"
                    class="w-full px-6 py-3 bg-red-500 text-white rounded-lg font-semibold shadow hover:shadow-lg transition-all hover:scale-105 active:scale-95">
                Выйти
            </button>
        </div>
    </div>

</div>

<script>
    const {createApp, ref, computed} = Vue

    createApp({
        setup() {
            // ===== STATE =====
            const isLoginMode = ref(true)
            const username = ref('')
            const password = ref('')
            const loading = ref(false)
            const error = ref('')
            const successMessage = ref('')

            const isAuthenticated = ref(false)
            const currentUser = ref({
                username: '',
                role: ''
            })

            // ===== COMPUTED =====
            const roleDisplay = computed(() => {
                const roleMap = {
                    'ROLE_ADMIN': 'Администратор',
                    'ROLE_USER': 'Пользователь',
                    'ROLE_ENGINEER': 'Инженер'
                }
                return roleMap[currentUser.value.role] || currentUser.value.role
            })

            // ===== МЕТОДЫ =====

            // Регистрация
            const register = async () => {
                error.value = ''
                successMessage.value = ''
                loading.value = true

                try {
                    const response = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            login: username.value,
                            password: password.value
                        })
                    })

                    if (!response.ok) {
                        const data = await response.json()
                        throw new Error(data.message || 'Ошибка регистрации')
                    }

                    successMessage.value = 'Регистрация успешна! Теперь войдите в систему.'
                    isLoginMode.value = true
                    password.value = ''

                } catch (e) {
                    error.value = e.message
                } finally {
                    loading.value = false
                }
            }

            // Вход
            const login = async () => {
                error.value = ''
                loading.value = true

                try {
                    const token = btoa(username.value + ':' + password.value)

                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: {'Authorization': 'Basic ' + token}
                    })

                    if (!response.ok) {
                        throw new Error('Неверный логин или пароль')
                    }

                    const data = await response.json()

                    // Сохраняем токен
                    localStorage.setItem('authToken', token)

                    isAuthenticated.value = true
                    currentUser.value = {
                        username: username.value,
                        role: data.role || 'ROLE_USER'
                    }

                } catch (e) {
                    error.value = e.message
                } finally {
                    loading.value = false
                }
            }

            // Выход
            const logout = () => {
                localStorage.removeItem('authToken')

                // Просто меняем состояние - Vue перерисует UI
                isAuthenticated.value = false
                currentUser.value = {username: '', role: ''}
                username.value = ''
                password.value = ''
                error.value = ''
                successMessage.value = ''
            }

            // Перейти к приложению (пока заглушка)
            const goToApp = () => {
                alert('Здесь будет игровое поле!')
                // TODO: добавить v-if для игрового компонента
            }

            // Проверка авторизации при загрузке
            const checkAuth = async () => {
                const token = localStorage.getItem('authToken')
                if (token) {
                    try {
                        const [login, pass] = atob(token).split(':')

                        // TODO: Реальная проверка на сервере
                        // const response = await fetch('/api/auth/me', {
                        //     headers: {'Authorization': 'Basic ' + token}
                        // })
                        // const data = await response.json()

                        // Временная заглушка
                        isAuthenticated.value = true
                        currentUser.value = {
                            username: login,
                            role: 'ROLE_USER'
                        }
                    } catch (e) {
                        localStorage.removeItem('authToken')
                    }
                }
            }

            // Проверяем авторизацию при загрузке
            checkAuth()

            return {
                isLoginMode,
                username,
                password,
                loading,
                error,
                successMessage,
                isAuthenticated,
                currentUser,
                roleDisplay,
                register,
                login,
                logout,
                goToApp
            }
        }
    }).mount('#app')
</script>
</body>

</html>
